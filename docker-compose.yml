version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clip2audio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clip2audio
      POSTGRES_USER: ${DB_USER:-clip2audio}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-clip2audio_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clip2audio}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clip2audio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clip2audio-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${DB_USER:-clip2audio}:${DB_PASSWORD:-clip2audio_secret}@postgres:5432/clip2audio
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
      MAX_DURATION_FREE: 7200
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-0x4AAAAAACn_WyhK90P-PM3dCZU5Jhl66yw}
    volumes:
      - downloads:/app/downloads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clip2audio-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  downloads:
