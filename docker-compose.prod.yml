version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: clip2audio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clip2audio
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: clip2audio-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clip2audio-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/clip2audio
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      CORS_ORIGIN: https://yt2mp3.ktr3.es
      MAX_DURATION_FREE: 7200
      TURNSTILE_SECRET: ${TURNSTILE_SECRET}
    volumes:
      - downloads:/app/downloads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clip2audio-api.rule=Host(`api-yt2mp3.ktr3.es`)"
      - "traefik.http.routers.clip2audio-api.entrypoints=websecure"
      - "traefik.http.routers.clip2audio-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.clip2audio-api.loadbalancer.server.port=3001"
    networks:
      - internal
      - easypanel

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clip2audio-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api-yt2mp3.ktr3.es/api
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.clip2audio-web.rule=Host(`yt2mp3.ktr3.es`)"
      - "traefik.http.routers.clip2audio-web.entrypoints=websecure"
      - "traefik.http.routers.clip2audio-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.clip2audio-web.loadbalancer.server.port=3000"
    networks:
      - internal
      - easypanel

volumes:
  pgdata:
  redisdata:
  downloads:

networks:
  internal:
    driver: bridge
  easypanel:
    external: true
